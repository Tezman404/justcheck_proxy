name: Download Selected Posts

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 playwright
          playwright install --with-deps chromium

      - name: Download selected posts
        run: python download_posts.py

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: selected-posts
          path: selected_posts.zip
          retention-days: 7
