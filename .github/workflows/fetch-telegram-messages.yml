name: Fetch Telegram Channel Messages

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  fetch-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install python-telegram-bot

      - name: Fetch and save messages
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_messages.py

      - name: Upload last message ID
        uses: actions/upload-artifact@v4
        with:
          name: last-message-id
          path: last_message_id.txt

      - name: Upload latest messages
        uses: actions/upload-artifact@v4
        with:
          name: latest-messages
          path: latest_messages.txt
