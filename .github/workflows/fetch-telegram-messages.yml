name: Fetch Telegram Channel Messages

on:
  workflow_dispatch:   # فقط اجرای دستی – بدون زمانبندی

jobs:
  scrape-channel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: python fetch_messages.py

      - name: Upload messages as artifact
        uses: actions/upload-artifact@v4
        with:
          name: latest-messages
          path: latest_messages.txt
          retention-days: 1
