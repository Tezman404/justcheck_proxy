name: Fetch Telegram Channel Messages

on:
  schedule:
    - cron: '*/30 * * * *'  # هر ۳۰ دقیقه یکبار اجرا شود
  workflow_dispatch:       # امکان اجرای دستی

jobs:
  fetch-messages:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install python-telegram-bot

      - name: Fetch new messages and output last 10
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python fetch_messages.py

      - name: Upload last message ID as artifact
        uses: actions/upload-artifact@v4
        with:
          name: last-message-id
          path: last_message_id.txt
          retention-days: 1

      - name: Download last message ID from previous run
        uses: actions/download-artifact@v4
        with:
          name: last-message-id
          path: .
        continue-on-error: true
